<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromoFortal - Ofertas Exclusivas</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#000,#1a1a1a);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      text-align:center;
      padding:20px;
    }

    .container{
      max-width:500px;
      background:#111;
      padding:40px;
      border-radius:20px;
      box-shadow:0 0 20px rgba(255,215,0,0.2);
    }

    .logo{
      width:140px;
      border-radius:50%;
      margin-bottom:20px;
    }

    h1{
      color:#FFD700;
      margin-bottom:15px;
    }

    p{
      color:#ddd;
      margin-bottom:30px;
      line-height:1.6;
    }

    .btn{
      display:inline-block;
      background:#25D366;
      color:white;
      padding:16px 30px;
      text-decoration:none;
      border-radius:50px;
      font-size:18px;
      font-weight:bold;
      transition:.3s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    .beneficios{
      margin-top:30px;
      text-align:left;
    }

    .beneficios p{
      margin:10px 0;
    }
  </style>
</head>
<body>

<div class="container">
  <img src="logo.png" class="logo" alt="PromoFortal">

  <h1>🔥 PromoFortal</h1>

  <p>
    Entre no nosso grupo VIP e receba promoções exclusivas de
    perfumes, relógios e acessórios todos os dias.
  </p>

  <a
    href="https://chat.whatsapp.com/ISuHQA8YnjwJMCdEDo7h4r"
    class="btn"
    target="_blank">
      Entrar no Grupo
  </a>

  <div class="beneficios">
    <p>✅ Promoções diárias</p>
    <p>✅ Perfumes importados e árabes</p>
    <p>✅ Relógios e acessórios</p>
    <p>✅ Sorteios e ofertas exclusivas</p>
  </div>
</div>

</body>
</html>
